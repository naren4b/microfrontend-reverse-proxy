events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;

    upstream electronics_backend {
        ip_hash;
        server dep-electronics:80;
    }

    upstream clothing_backend {
        ip_hash;
        server dep-clothing:80;
    }

    # 1. HTTP Server - Redirects all traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS Server - Handles SSL and Proxy Routing
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate         /etc/nginx/certs/tls.crt;
        ssl_certificate_key     /etc/nginx/certs/tls.key;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             HIGH:!aNULL:!MD5;

        # Serve your home page from my-lb/html/index.html
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        # Catch /red and any deep path under /red/**
        location /red {
            rewrite ^/red(?:/(.*))?$ /$1 break;
            proxy_pass http://electronics_backend;

            # FORCE backend to use relative redirects instead of absolute 'http://localhost/...'
            proxy_set_header Absolute-Redirect off;

            # CATCH absolute or relative redirects and prepend /red/ back onto them
            proxy_redirect ~^https?://[^/]+/(.*) /red/$1;
            proxy_redirect / /red/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch /blue and any deep path under /blue/**
        location /blue {
            rewrite ^/blue(?:/(.*))?$ /$1 break;
            proxy_pass http://clothing_backend;

            # FORCE backend to use relative redirects
            proxy_set_header Absolute-Redirect off;

            # CATCH absolute or relative redirects and prepend /blue/ back onto them
            proxy_redirect ~^https?://[^/]+/(.*) /blue/$1;
            proxy_redirect / /blue/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
